<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1 class="game-title">TIC TAC TOE</h1>
    <p id="plays">Player X's turn </p>
    <div class="grid-container">
        <div class="cell" game-move="0"></div>
        <div class="cell" game-move="1"></div>
        <div class="cell" game-move="2"></div>
        <div class="cell" game-move="3"></div>
        <div class="cell" game-move="4"></div>
        <div class="cell" game-move="5"></div>
        <div class="cell" game-move="6"></div>
        <div class="cell" game-move="7"></div>
        <div class="cell" game-move="8"></div>
    
      </div>

      <div id="gameScore">
        <p id="scoreX">Player X: 0</p>
        <p id="computer">Computer : 0</p>
      </div>
      <div class="btn-container">
        <button id="play-btn" onclick="playAgain()">Play Again</button>
        <button id="reset-btn" onclick="resetGame()">Reset Game</button>
      </div>
  </div>

<script src="script.js"></script>

</body>
</html>
